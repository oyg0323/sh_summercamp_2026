<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b6e99">
<title>여름 한조각 · 현장 운영</title>
<style>
  :root{
    --blue:#0b6e99; --blue-d:#085575; --sand:#f7b733; --bg:#f4f6f8;
    --card:#ffffff; --line:#e3e8ee; --txt:#1c2733; --sub:#5c6b7a;
    --now:#0e8a5f; --now-bg:#e8f7f0; --past:#9aa7b3; --red:#d84343;
    --nav-h:60px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--txt); font-size:15px; line-height:1.45;
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px);
  }
  header{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(135deg,var(--blue) 0%,#0c8ab8 100%);
    color:#fff; padding:12px 16px 10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .h-top{display:flex; justify-content:space-between; align-items:baseline;}
  .h-title{font-size:17px; font-weight:800; letter-spacing:-.3px;}
  .h-title small{font-weight:500; opacity:.85; font-size:12px; margin-left:6px;}
  #clock{font-size:15px; font-weight:700; font-variant-numeric:tabular-nums;}
  .h-bot{display:flex; justify-content:space-between; align-items:center; margin-top:6px;}
  #status-pill{
    font-size:12px; font-weight:700; background:rgba(255,255,255,.2);
    border-radius:20px; padding:3px 10px;
  }
  #now-brief{font-size:12px; opacity:.95; max-width:60%; text-align:right;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  nav{
    position:fixed; bottom:0; left:0; right:0; z-index:30;
    background:var(--card); border-top:1px solid var(--line);
    display:flex; height:calc(var(--nav-h) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);
    box-shadow:0 -2px 10px rgba(0,0,0,.06);
  }
  nav button{
    flex:1; border:0; background:none; font-family:inherit;
    font-size:11px; color:var(--sub); font-weight:600; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  }
  nav button .ico{font-size:20px; line-height:1;}
  nav button.on{color:var(--blue);}
  main{padding:12px 12px 4px; max-width:640px; margin:0 auto;}
  .page{display:none;} .page.on{display:block;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; margin-bottom:10px;}
  h2{font-size:15px; margin:4px 2px 10px; font-weight:800;}
  .muted{color:var(--sub); font-size:12px;}
  .btn{
    border:1px solid var(--line); background:var(--card); color:var(--sub);
    font-family:inherit; font-size:12px; font-weight:600;
    border-radius:20px; padding:6px 12px; cursor:pointer;
  }
  .day-chips{display:flex; gap:8px; margin-bottom:10px;}
  .day-chips button{
    flex:1; border:1px solid var(--line); background:var(--card); border-radius:12px;
    padding:8px 4px; font-family:inherit; cursor:pointer; text-align:center;
  }
  .day-chips .d1{font-size:14px; font-weight:800; color:var(--txt);}
  .day-chips .d2{font-size:11px; color:var(--sub);}
  .day-chips button.on{background:var(--blue); border-color:var(--blue);}
  .day-chips button.on .d1,.day-chips button.on .d2{color:#fff;}
  .track-chips{display:none; gap:8px; margin-bottom:12px;}
  .track-chips.show{display:flex;}
  .track-chips button{
    flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:24px;
    padding:9px 4px; font-family:inherit; cursor:pointer;
    font-size:13.5px; font-weight:800; color:var(--sub);
  }
  .track-chips button.on{background:var(--sand); border-color:var(--sand); color:#5b4200;}
  .tl-item{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:11px 13px; margin-bottom:8px; position:relative;
  }
  .tl-item.has-chk{cursor:pointer;}
  .tl-item.past{opacity:.55;}
  .tl-item.now{
    border:2px solid var(--now); background:var(--now-bg);
    box-shadow:0 2px 10px rgba(14,138,95,.18);
  }
  .tl-time{font-size:13px; font-weight:800; color:var(--blue); font-variant-numeric:tabular-nums;}
  .tl-item.now .tl-time{color:var(--now);}
  .track-tag{
    display:inline-block; font-size:10px; font-weight:800; vertical-align:2px;
    border-radius:8px; padding:1px 7px; margin-left:6px;
  }
  .track-tag.e{background:#e2f1fb; color:#0b6e99;}
  .track-tag.m{background:#fdeecd; color:#8a6100;}
  .now-badge{
    position:absolute; top:-9px; right:12px; background:var(--now); color:#fff;
    font-size:10px; font-weight:800; padding:2px 9px; border-radius:10px;
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .next-badge{
    position:absolute; top:-9px; right:12px; background:var(--sand); color:#5b4200;
    font-size:10px; font-weight:800; padding:2px 9px; border-radius:10px;
  }
  .tl-title{font-size:15px; font-weight:700; margin-top:2px;}
  .tl-meta{font-size:12px; color:var(--sub); margin-top:3px;}
  .tl-meta b{color:var(--txt); font-weight:600;}
  .tl-note{font-size:12px; color:var(--sub); margin-top:5px; white-space:pre-line;
    border-top:1px dashed var(--line); padding-top:5px;}
  .tl-sub{margin-top:7px; border-left:3px solid var(--line); padding-left:9px;}
  .tl-sub .s-row{font-size:12.5px; margin-bottom:4px;}
  .tl-sub .s-row b{color:var(--blue-d);}
  .chk-summary{
    display:flex; align-items:center; gap:6px; margin-top:8px;
    font-size:12px; font-weight:700; color:var(--blue);
    border-top:1px solid var(--line); padding-top:7px;
  }
  .tl-item.now .chk-summary{border-color:rgba(14,138,95,.25);}
  .chk-summary .arrow{margin-left:auto; transition:transform .2s; font-size:11px; color:var(--sub);}
  .tl-item.open .chk-summary .arrow{transform:rotate(90deg);}
  .chk-summary .cnt{font-variant-numeric:tabular-nums;}
  .chk-summary .cnt.full{color:var(--now);}
  .chk-list{display:none; margin-top:4px;}
  .tl-item.open .chk-list{display:block;}
  label.chk{
    display:flex; align-items:center; gap:10px; padding:8px 2px;
    border-bottom:1px solid var(--line); cursor:pointer;
  }
  label.chk:last-child{border-bottom:0;}
  label.chk input[type=checkbox]{
    width:21px; height:21px; accent-color:var(--now); flex-shrink:0;
  }
  label.chk .t{flex:1; font-size:13.5px;}
  label.chk .t small{display:block; color:var(--sub); font-size:11px;}
  label.chk.done .t{color:var(--past); text-decoration:line-through;}
  #goto-now{
    position:fixed; right:14px; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px);
    z-index:25; background:var(--now); color:#fff; border:0; border-radius:24px;
    padding:10px 16px; font-family:inherit; font-size:13px; font-weight:700;
    box-shadow:0 4px 12px rgba(0,0,0,.25); cursor:pointer; display:none;
  }
  .prog-wrap{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .prog-bar{flex:1; height:8px; background:var(--line); border-radius:6px; overflow:hidden;}
  .prog-bar i{display:block; height:100%; background:var(--now); border-radius:6px;
    transition:width .25s;}
  .prog-txt{font-size:13px; font-weight:800; font-variant-numeric:tabular-nums;}
  .fl-chips{display:flex; gap:8px; margin-bottom:10px;}
  .fl-chips button{
    flex:1; border:1px solid var(--line); background:var(--card); border-radius:12px;
    padding:9px 4px; font-family:inherit; cursor:pointer;
  }
  .fl-chips button.on{background:var(--blue); border-color:var(--blue); color:#fff;}
  .fl-chips .f1{font-size:13px; font-weight:800;}
  .fl-chips .f2{font-size:11px; opacity:.8;}
  .grade-head{
    font-size:12px; font-weight:800; color:var(--blue-d);
    background:#eaf3f8; border-radius:8px; padding:4px 10px; margin:12px 0 2px;
  }
  .st-row{display:flex; align-items:center; gap:8px; padding:7px 2px;
    border-bottom:1px solid var(--line);}
  .st-row input[type=checkbox]{width:21px; height:21px; accent-color:var(--now); flex-shrink:0;}
  .st-name{flex:1; font-size:14px; font-weight:600;}
  .st-name small{font-weight:400; color:var(--sub); font-size:11px; margin-left:4px;}
  .st-row.done .st-name{color:var(--past); text-decoration:line-through;}
  .seat-in{
    width:64px; border:1px solid var(--line); border-radius:8px; padding:5px 6px;
    font-family:inherit; font-size:12px; text-align:center; color:var(--txt);
    background:#fafbfc;
  }
  .seat-in:focus{outline:2px solid var(--blue); border-color:var(--blue); background:#fff;}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin:4px 2px 10px;}
</style>
</head>
<body>

<header>
  <div class="h-top">
    <div class="h-title">☀️ 여름 한조각<small>2026 여름신앙학교 · 제주</small></div>
    <div id="clock">--:--:--</div>
  </div>
  <div class="h-bot">
    <div id="status-pill">준비 중</div>
    <div id="now-brief"></div>
  </div>
</header>

<main>
  <section class="page on" id="pg-sched">
    <div class="day-chips" id="day-chips"></div>
    <div class="track-chips" id="track-chips">
      <button id="tr-e" onclick="pickTrack('e')">🌊 초등부</button>
      <button id="tr-m" onclick="pickTrack('m')">🎣 중고등부</button>
    </div>
    <div class="muted" style="margin:0 4px 10px">일정을 탭하면 해당 일정의 체크리스트가 열립니다. 체크는 자동 저장됩니다.</div>
    <div id="tl"></div>
  </section>

  <section class="page" id="pg-fly">
    <div class="toolbar">
      <h2 style="margin:0">✈️ 탑승 체크</h2>
      <button class="btn" onclick="resetFlight()">현재 편 초기화</button>
    </div>
    <div class="card muted" style="margin-bottom:10px">
      기준 인원 : 학생 40명 · 봉사자 15명 · 총 55명 &nbsp;|&nbsp; 좌석 칸은 탭해서 직접 입력(자동 저장)
    </div>
    <div class="fl-chips" id="fl-chips"></div>
    <div class="prog-wrap">
      <div class="prog-bar"><i id="fly-bar"></i></div>
      <div class="prog-txt" id="fly-cnt">0/40</div>
    </div>
    <div class="card" id="st-list"></div>
  </section>
</main>

<button id="goto-now" onclick="scrollToNow()">⬇ 현재 일정</button>

<nav>
  <button class="on" data-pg="pg-sched"><span class="ico">📅</span>일정</button>
  <button data-pg="pg-fly"><span class="ico">✈️</span>탑승체크</button>
</nav>

    pill.textContent='🏝 '+DAYS[di].label+' 진행 중 ('+pad(now.getMonth()+1)+'.'+pad(now.getDate())+' '+wd+')';
    const cur=currentItems(di,now);
    brief.textContent=cur.length?('지금 : '+cur[0].t):'';
  }else{
    const start=new Date(2026,6,30), end=new Date(2026,7,1);
    const today0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    if(today0<start){
      const dd=Math.round((start-today0)/86400000);
      pill.textContent='🗓 출발까지 D-'+dd+' (7.30 06:00 성당 집결)';
    }else if(today0>end){
      pill.textContent='✅ 일정 종료 — 수고하셨습니다!';
    }
    brief.textContent='';
  }
}
function currentItems(di,now){
  const m=now.getHours()*60+now.getMinutes();
  return DAYS[di].items.filter(it=>visible(it) && toMin(it.s)<=m && m<toMin(it.e));
}

function renderChips(){
  document.getElementById('day-chips').innerHTML=DAYS.map((d,i)=>
    `<button class="${i===selDay?'on':''}" onclick="pickDay(${i})">
      <div class="d1">${d.label}</div><div class="d2">${d.sub}</div></button>`).join('');
  const hasTracks=DAYS[selDay].items.some(it=>it.track);
  document.getElementById('track-chips').classList.toggle('show',hasTracks);
  document.getElementById('tr-e').classList.toggle('on',selTrack==='e');
  document.getElementById('tr-m').classList.toggle('on',selTrack==='m');
}
function pickDay(i){selDay=i;renderChips();renderTL();}
function pickTrack(tr){selTrack=tr;set('track',tr);renderChips();renderTL();}

function chkCount(di,ii){
  const it=DAYS[di].items[ii];
  if(!it.chk) return [0,0];
  const done=it.chk.filter((_,k)=>get('ic_'+di+'_'+ii+'_'+k)==='1').length;
  return [done,it.chk.length];
}

function itemHTML(it,state,di,ii){
  const key=di+'_'+ii;
  const badge=state==='now'?'<span class="now-badge">NOW</span>':
              state==='next'?'<span class="next-badge">다음</span>':'';
  const tag=it.track?('<span class="track-tag '+it.track+'">'+(it.track==='e'?'초등부':'중고등부')+'</span>'):'';
  const meta=[it.w?('담당 <b>'+esc(it.w)+'</b>'):'', it.p?('📍 '+esc(it.p)):''].filter(Boolean).join(' &nbsp;·&nbsp; ');
  const sub=it.sub?('<div class="tl-sub">'+it.sub.map(s=>
    '<div class="s-row">'+(s.s?('<b>'+s.s+'~'+s.e+'</b> '):'')+esc(s.t)+'</div>').join('')+'</div>'):'';
  let chkHtml='';
  if(it.chk){
    const [done,total]=chkCount(di,ii);
    const rows=it.chk.map((c,k)=>{
      const on=get('ic_'+key+'_'+k)==='1';
      return `<label class="chk ${on?'done':''}" onclick="event.stopPropagation()">
        <input type="checkbox" ${on?'checked':''} onchange="tglChk(${di},${ii},${k},this)">
        <span class="t">${esc(c[0])}${c[1]?'<small>'+esc(c[1])+'</small>':''}</span></label>`;
    }).join('');
    chkHtml=`<div class="chk-summary">✅ 체크리스트
        <span class="cnt ${done===total?'full':''}" id="cc-${key}">${done}/${total}</span>
        <span class="arrow">▶</span></div>
      <div class="chk-list">${rows}</div>`;
  }
  return `<div class="tl-item ${state==='past'?'past':state==='now'?'now':''} ${it.chk?'has-chk':''} ${openSet.has(key)?'open':''}"
    ${state==='now'?'data-now="1"':''} ${it.chk?`onclick="tglOpen('${key}',this)"`:''}>
    ${badge}
    <div class="tl-time">${it.s} ~ ${it.e==='24:00'?'':it.e}${tag}</div>
    <div class="tl-title">${esc(it.t)}</div>
    ${meta?'<div class="tl-meta">'+meta+'</div>':''}
    ${sub}
    ${it.n?'<div class="tl-note">'+esc(it.n)+'</div>':''}
    ${chkHtml}
  </div>`;
}
function tglOpen(key,el){
  if(openSet.has(key)){openSet.delete(key);el.classList.remove('open');}
  else{openSet.add(key);el.classList.add('open');}
}
function tglChk(di,ii,k,el){
  set('ic_'+di+'_'+ii+'_'+k, el.checked?'1':'0');
  el.closest('label').classList.toggle('done',el.checked);
  const [done,total]=chkCount(di,ii);
  const cc=document.getElementById('cc-'+di+'_'+ii);
  if(cc){cc.textContent=done+'/'+total; cc.classList.toggle('full',done===total);}
}
function renderTL(){
  const now=new Date(), isToday=DAYS[selDay].date===todayStr(now);
  const m=now.getHours()*60+now.getMinutes();
  let nextMarked=false;
  document.getElementById('tl').innerHTML=DAYS[selDay].items.map((it,ii)=>{
    if(!visible(it)) return '';
    let st='';
    if(isToday){
      if(toMin(it.e)<=m) st='past';
      else if(toMin(it.s)<=m) st='now';
      else if(!nextMarked){st='next';nextMarked=true;}
    }
    return itemHTML(it,st,selDay,ii);
  }).join('');
  document.getElementById('goto-now').style.display=
    (isToday && document.querySelector('#pg-sched.on') && document.querySelector('[data-now]'))?'block':'none';
}
function scrollToNow(){
  const el=document.querySelector('[data-now]');
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

let selFl=0;
(function initFl(){ if(todayStr(new Date())>='2026-08-01') selFl=1; })();

function renderFlChips(){
  document.getElementById('fl-chips').innerHTML=FLIGHTS.map((f,i)=>
    `<button class="${i===selFl?'on':''}" onclick="pickFl(${i})">
      <div class="f1">${f.f1}</div><div class="f2">${f.f2}</div></button>`).join('');
}
function pickFl(i){selFl=i;renderFlChips();renderSt();}

/* 체크 키는 학생 이름 기준 → 명단 순서가 바뀌어도 체크 유지 */
function renderSt(){
  const fid=FLIGHTS[selFl].id;
  let html='', lastGrade='';
  STUDENTS.forEach((s,i)=>{
    if(s[0]!==lastGrade){lastGrade=s[0];
      const cnt=STUDENTS.filter(x=>x[0]===s[0]).length;
      html+=`<div class="grade-head">${s[0]} (${cnt}명)</div>`;}
    const on=get('fl_'+fid+'_'+s[1])==='1';
    const seat=get('seat_'+fid+'_'+s[1])||'';
    html+=`<div class="st-row ${on?'done':''}" id="str-${i}">
      <input type="checkbox" ${on?'checked':''} onchange="tglFl(${i},this)">
      <span class="st-name">${esc(s[1])}${s[2]?'<small>'+esc(s[2])+'</small>':''}</span>
      <input class="seat-in" placeholder="좌석" maxlength="4" value="${esc(seat)}"
        oninput="set('seat_${fid}_${s[1]}',this.value)">
    </div>`;
  });
  document.getElementById('st-list').innerHTML=html;
  updFlyProg();
}
function tglFl(i,el){
  const fid=FLIGHTS[selFl].id;
  set('fl_'+fid+'_'+STUDENTS[i][1], el.checked?'1':'0');
  document.getElementById('str-'+i).classList.toggle('done',el.checked);
  updFlyProg();
}
function updFlyProg(){
  const fid=FLIGHTS[selFl].id;
  const done=STUDENTS.filter(s=>get('fl_'+fid+'_'+s[1])==='1').length;
  document.getElementById('fly-cnt').textContent=done+'/'+STUDENTS.length;
  document.getElementById('fly-bar').style.width=(done/STUDENTS.length*100)+'%';
}
function resetFlight(){
  const f=FLIGHTS[selFl];
  if(!confirm(f.f1+' 탑승 체크를 초기화할까요? (좌석 입력은 유지)'))return;
  STUDENTS.forEach(s=>del('fl_'+f.id+'_'+s[1]));
  renderSt();
}

document.querySelectorAll('nav button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById(b.dataset.pg).classList.add('on');
    window.scrollTo(0,0);
    renderTL();
  });
});

renderChips(); renderTL(); renderFlChips(); renderSt();
tick(); setInterval(tick,1000);
setInterval(renderTL,30000);
</script>
